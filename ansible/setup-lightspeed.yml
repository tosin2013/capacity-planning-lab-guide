---
# DEV / TEST WRAPPER — for local testing without agd.
#
# Production path (RHDP):
#   1. Add ocp4_workload_lightspeed to workloads: in agnosticd-v2-vars/student-compact-aws.yml
#   2. Set ocp4_workload_lightspeed_litemaas_api_token in the per-student vars file
#   3. Run: agd provision -g <guid> -c openshift-workloads -a <account>
#
# This playbook wraps the ocp4_workload_lightspeed role with ACTION: provision so
# it can be run directly with ansible-playbook for development and testing.
#
# Usage:
#   # Verify available model IDs first
#   TOKEN=sk-your-virtual-key
#   curl -s -H "Authorization: Bearer $TOKEN" \
#     https://litellm-prod.apps.maas.redhatworkshops.io/v1/models | jq '.data[].id'
#
#   # Install with granite only (standard lab-prod package)
#   KUBECONFIG=... ansible-playbook setup-lightspeed.yml \
#     -e ocp4_workload_lightspeed_litemaas_api_token=$TOKEN
#
#   # Install with both models (requires qwen3 in allowed_models)
#   KUBECONFIG=... ansible-playbook setup-lightspeed.yml \
#     -e ocp4_workload_lightspeed_litemaas_api_token=$TOKEN \
#     -e ocp4_workload_lightspeed_model_comparison=qwen3-14b \
#     -e ocp4_workload_lightspeed_introspection_enabled=true
#
# Prerequisites:
#   ansible-galaxy collection install kubernetes.core

- name: Configure OpenShift Lightspeed for Module 8 (dev/test wrapper)
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    ACTION: provision
    # Override on the command line with -e ocp4_workload_lightspeed_litemaas_api_token=sk-...
    ocp4_workload_lightspeed_litemaas_api_token: ""
    # openshift_cluster_ingress_domain is required by agnosticd_user_info step.
    # Set it to the actual ingress domain when running standalone.
    openshift_cluster_ingress_domain: "{{ lookup('env', 'OCP_INGRESS_DOMAIN') | default('') }}"

  roles:
    - role: ocp4_workload_lightspeed

---
# Installs the OpenShift Lightspeed Operator via OLM and configures it to use
# the RHDP LiteMaaS LiteLLM proxy as its LLM backend.
#
# Prerequisites:
#   - OCP 4.21+ cluster with cluster-admin
#   - kubernetes.core collection installed
#   - ocp4_workload_lightspeed_litemaas_api_token set (non-empty string)
#
# Token provisioning in RHDP:
#   AgnosticD calls rhpds.litellm_virtual_keys during provisioning to create a
#   virtual key named "virtkey-{{ guid }}" with the "lab-prod" package
#   (Granite + Mistral, 90 days). Pass the resulting key as:
#     ocp4_workload_lightspeed_litemaas_api_token: "{{ agnosticd_user_info.litemaas_api_key }}"

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - ocp4_workload_lightspeed_litemaas_api_token | length > 0
    fail_msg: >
      ocp4_workload_lightspeed_litemaas_api_token must be set to a non-empty LiteMaaS
      virtual key. In AgnosticD, source this from agnosticd_user_info.litemaas_api_key
      after running rhpds.litellm_virtual_keys with package=lab-prod.

# ── Step 1: Create namespace ──────────────────────────────────────────────────

- name: Create openshift-lightspeed namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ ocp4_workload_lightspeed_namespace }}"
        labels:
          openshift.io/cluster-monitoring: "true"

# ── Step 2: Install the Lightspeed Operator via OLM ──────────────────────────

- name: Create OperatorGroup for Lightspeed (OwnNamespace)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: operators.coreos.com/v1
      kind: OperatorGroup
      metadata:
        name: openshift-lightspeed
        namespace: "{{ ocp4_workload_lightspeed_namespace }}"
      spec:
        targetNamespaces:
          - "{{ ocp4_workload_lightspeed_namespace }}"

- name: Create Subscription for OpenShift Lightspeed Operator
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: operators.coreos.com/v1alpha1
      kind: Subscription
      metadata:
        name: openshift-lightspeed
        namespace: "{{ ocp4_workload_lightspeed_namespace }}"
      spec:
        channel: "{{ ocp4_workload_lightspeed_channel }}"
        installPlanApproval: Automatic
        name: lightspeed-operator
        source: redhat-operators
        sourceNamespace: openshift-marketplace

- name: Wait for Lightspeed Operator pod to be Running
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: "{{ ocp4_workload_lightspeed_namespace }}"
    label_selectors:
      - "control-plane=controller-manager"
  register: _ocp4_workload_lightspeed_operator_pods
  until:
    - _ocp4_workload_lightspeed_operator_pods.resources | length > 0
    - _ocp4_workload_lightspeed_operator_pods.resources[0].status.phase == "Running"
  retries: "{{ ocp4_workload_lightspeed_operator_wait_retries }}"
  delay: "{{ ocp4_workload_lightspeed_operator_wait_delay }}"

- name: Wait for OLSConfig CRD to be established
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: olsconfigs.ols.openshift.io
  register: _ocp4_workload_lightspeed_crd
  until:
    - _ocp4_workload_lightspeed_crd.resources | length > 0
    - _ocp4_workload_lightspeed_crd.resources[0].status.conditions |
      selectattr('type', 'equalto', 'Established') |
      selectattr('status', 'equalto', 'True') | list | length > 0
  retries: 18
  delay: 10

# ── Step 3: Store LiteMaaS credentials as a Secret ───────────────────────────

- name: Create LiteMaaS credentials secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: litemaas-credentials
        namespace: "{{ ocp4_workload_lightspeed_namespace }}"
      type: Opaque
      stringData:
        apitoken: "{{ ocp4_workload_lightspeed_litemaas_api_token }}"

# ── Step 4: Build the model list dynamically ─────────────────────────────────

- name: Set base model list (primary only)
  ansible.builtin.set_fact:
    _ocp4_workload_lightspeed_models:
      - name: "{{ ocp4_workload_lightspeed_model_primary }}"

- name: Append comparison model when configured
  ansible.builtin.set_fact:
    _ocp4_workload_lightspeed_models: >-
      {{ _ocp4_workload_lightspeed_models + [{'name': ocp4_workload_lightspeed_model_comparison}] }}
  when: ocp4_workload_lightspeed_model_comparison | length > 0

# ── Step 5: Apply OLSConfig CR ───────────────────────────────────────────────

- name: Apply OLSConfig CR pointing to LiteMaaS
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: ols.openshift.io/v1alpha1
      kind: OLSConfig
      metadata:
        name: cluster
      spec:
        llm:
          providers:
            - name: litemaas
              type: openai
              url: "{{ ocp4_workload_lightspeed_litemaas_api_url }}"
              credentialsSecretRef:
                name: litemaas-credentials
              models: "{{ _ocp4_workload_lightspeed_models }}"
        ols:
          defaultProvider: litemaas
          defaultModel: "{{ ocp4_workload_lightspeed_model_primary }}"
          logLevel: INFO
          introspectionEnabled: "{{ ocp4_workload_lightspeed_introspection_enabled | bool }}"

# ── Step 6: Wait for Lightspeed service pod to be Running ────────────────────

- name: Wait for Lightspeed service pod to be Running
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: "{{ ocp4_workload_lightspeed_namespace }}"
    label_selectors:
      - "app.kubernetes.io/name=lightspeed-service-api"
  register: _ocp4_workload_lightspeed_service_pods
  until:
    - _ocp4_workload_lightspeed_service_pods.resources | length > 0
    - _ocp4_workload_lightspeed_service_pods.resources[0].status.phase == "Running"
  retries: 18
  delay: 10

# ── Step 7: Grant MCP cluster-reader RBAC (only when introspection enabled) ──

- name: Grant cluster-reader to lightspeed-app-server SA for MCP tool access
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: lightspeed-mcp-cluster-reader
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: cluster-reader
      subjects:
        - kind: ServiceAccount
          name: lightspeed-app-server
          namespace: "{{ ocp4_workload_lightspeed_namespace }}"
  when: ocp4_workload_lightspeed_introspection_enabled | bool

# ── Step 8: Report deployment info ───────────────────────────────────────────

- name: Report Lightspeed deployment info
  agnosticd.core.agnosticd_user_info:
    data:
      lightspeed_console_url: "https://console-openshift-console.apps.{{ openshift_cluster_ingress_domain }}"
      lightspeed_model_primary: "{{ ocp4_workload_lightspeed_model_primary }}"
      lightspeed_introspection_enabled: "{{ ocp4_workload_lightspeed_introspection_enabled }}"
  ignore_errors: true

- name: Print Lightspeed setup summary
  ansible.builtin.debug:
    msg:
      - "OpenShift Lightspeed is ready."
      - "Default model      : {{ ocp4_workload_lightspeed_model_primary }}"
      - "Comparison model   : {{ ocp4_workload_lightspeed_model_comparison if ocp4_workload_lightspeed_model_comparison | length > 0 else 'not configured' }}"
      - "Cluster interaction: {{ ocp4_workload_lightspeed_introspection_enabled }}"
      - "Students open the lightbulb icon in the OCP web console to access Lightspeed."

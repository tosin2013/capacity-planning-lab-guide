---
# kube-burner Deployment template — etcd event churn (Wave 3)
#
# Deployments at replicas=0 generate Deployment + ReplicaSet + Event objects
# without actually scheduling any pods, keeping node load unaffected while
# still driving up etcd database size through object/event churn.
#
# Selector uses kube-burner.io/job which kube-burner auto-injects into the
# pod template on every object — this avoids the matchLabels/template mismatch
# that occurs when using {{.Iteration}} inside spec.template.metadata.labels.
# With replicas=0, overlapping selectors across the 20 deployments are harmless.
#
# Bulk cleanup via label on Deployment metadata:
#   oc delete deployment -n capacity-workshop -l app=etcd-pressure
apiVersion: apps/v1
kind: Deployment
metadata:
  name: etcd-pressure-{{.Iteration}}
  labels:
    app: etcd-pressure
    wave: "3"
    demo.redhat.com/application: capacity-workshop
    module: "6"
spec:
  replicas: 0
  selector:
    matchLabels:
      kube-burner.io/job: etcd-pressure-wave3
  template:
    metadata:
      labels:
        app: etcd-pressure
        wave: "3"
        demo.redhat.com/application: capacity-workshop
    spec:
      containers:
      - name: pressure
        image: registry.access.redhat.com/ubi9/ubi-micro:latest
        command: ["/bin/sh", "-c", "sleep infinity"]
        resources:
          requests:
            cpu: 10m
            memory: 16Mi

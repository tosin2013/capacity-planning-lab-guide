kind: ConfigMap
apiVersion: v1
metadata:
  name: module-5---multi-cluster-capacity-planning
  namespace: open-cluster-management-observability
  labels:
    grafana-custom-dashboard: "true"
data:
  module-5---multi-cluster-capacity-planning.json: |
    {"id": 69, "panels": [{"datasource": {"type": "prometheus", "uid": "${datasource}"}, "description": "Current pod count per cluster. Green < 5000, yellow 5000-8000, red > 8000 (approaching etcd object count limit).", "fieldConfig": {"defaults": {"min": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 5000}, {"color": "red", "value": 8000}]}, "unit": "short"}}, "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0}, "id": 1, "options": {"displayMode": "gradient", "orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"]}, "showUnfilled": true}, "targets": [{"expr": "sum by (cluster) (kube_pod_info{cluster=~\"$cluster\"})", "legendFormat": "{{cluster}}", "refId": "A"}], "title": "Total Pods by Cluster", "type": "bargauge"}, {"datasource": {"type": "prometheus", "uid": "${datasource}"}, "description": "Compares total CPU requests (what pods asked for) against actual CPU usage. A large gap indicates over-provisioning.", "fieldConfig": {"defaults": {"custom": {"lineWidth": 2}, "unit": "cores"}}, "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0}, "id": 2, "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}}, "targets": [{"expr": "sum(kube_pod_container_resource_requests{cluster=~\"$cluster\", resource=\"cpu\"})", "legendFormat": "Requested CPU (cores)", "refId": "A"}, {"expr": "sum(rate(container_cpu_usage_seconds_total{cluster=~\"$cluster\", container!=\"\"}[5m]))", "legendFormat": "Actual CPU Usage (cores)", "refId": "B"}], "title": "CPU: Requested vs Used (All Clusters)", "type": "timeseries"}, {"datasource": {"type": "prometheus", "uid": "${datasource}"}, "description": "Compares total memory requests against actual working set memory. Gap shows memory over-provisioning across the fleet.", "fieldConfig": {"defaults": {"custom": {"lineWidth": 2}, "unit": "bytes"}}, "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8}, "id": 3, "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}}, "targets": [{"expr": "sum(kube_pod_container_resource_requests{cluster=~\"$cluster\", resource=\"memory\"})", "legendFormat": "Requested Memory", "refId": "A"}, {"expr": "sum(container_memory_working_set_bytes{cluster=~\"$cluster\", container!=\"\"})", "legendFormat": "Actual Memory Usage", "refId": "B"}], "title": "Memory: Requested vs Used (All Clusters)", "type": "timeseries"}, {"datasource": {"type": "prometheus", "uid": "${datasource}"}, "description": "Days remaining before CPU capacity is exhausted at current growth rate (30-day average). Red < 30 days, yellow 30-90, green > 90.", "fieldConfig": {"defaults": {"custom": {"displayMode": "color-background"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 30}, {"color": "green", "value": 90}]}, "unit": "d"}}, "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8}, "id": 4, "options": {"sortBy": [{"desc": false, "displayName": "Value"}]}, "targets": [{"expr": "(\n  sum by (cluster) (kube_node_status_allocatable{cluster=~\"$cluster\", resource=\"cpu\"})\n  -\n  sum by (cluster) (kube_pod_container_resource_requests{cluster=~\"$cluster\", resource=\"cpu\"})\n)\n/\n(\n  sum by (cluster) (increase(kube_pod_container_resource_requests{cluster=~\"$cluster\", resource=\"cpu\"}[30d]) / 30)\n)", "instant": true, "legendFormat": "{{cluster}}", "refId": "A"}], "title": "Capacity Runway by Cluster (Days Until CPU Full)", "type": "table"}, {"datasource": {"type": "prometheus", "uid": "${datasource}"}, "description": "Pods per worker node per cluster. Green < 150, yellow 150-200, red > 200 (approaching Kubernetes maxPods default of 250).", "fieldConfig": {"defaults": {"displayName": "${__series.name}", "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 150}, {"color": "red", "value": 200}]}, "unit": "short"}}, "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16}, "id": 5, "options": {"colorMode": "background", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"]}, "textMode": "auto"}, "targets": [{"expr": "sum by (cluster) (kube_pod_info{cluster=~\"$cluster\"}) / sum by (cluster) (kube_node_info{cluster=~\"$cluster\", node_role_kubernetes_io_worker=\"\"})", "legendFormat": "{{cluster}}", "refId": "A"}], "title": "Average Pod Density (pods/node)", "type": "stat"}, {"datasource": {"type": "prometheus", "uid": "${datasource}"}, "description": "etcd DB size per cluster. RHACM renames etcd_mvcc_db_total_size_in_bytes to etcd_debugging_mvcc_db_total_size_in_bytes in Thanos. Green < 4GB, yellow 4-6GB, red > 6GB (approaching the 8GB hard limit).", "fieldConfig": {"defaults": {"max": 8192, "min": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 4096}, {"color": "red", "value": 6144}]}, "unit": "decmbytes"}}, "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16}, "id": 6, "options": {"displayMode": "gradient", "orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"]}, "showUnfilled": true}, "targets": [{"expr": "max by (cluster) (etcd_debugging_mvcc_db_total_size_in_bytes{cluster=~\"$cluster\"}) / 1024 / 1024", "legendFormat": "{{cluster}}", "refId": "A"}], "title": "etcd Database Size (MB)", "type": "bargauge"}, {"datasource": {"type": "prometheus", "uid": "${datasource}"}, "description": "Identifies which namespaces consumed the most CPU resources over the last 30 days \u2014 the foundation of chargeback and capacity showback reports.", "fieldConfig": {"defaults": {"unit": "cores"}}, "gridPos": {"h": 8, "w": 24, "x": 0, "y": 24}, "id": 7, "options": {"sortBy": [{"desc": true, "displayName": "Value"}]}, "targets": [{"expr": "topk(10, sum by (namespace, cluster) (avg_over_time(kube_pod_container_resource_requests{cluster=~\"$cluster\", resource=\"cpu\"}[30d])))", "instant": true, "legendFormat": "{{cluster}} / {{namespace}}", "refId": "A"}], "title": "Top 10 Namespaces by Avg CPU Request (30d Showback)", "transformations": [{"id": "sortBy", "options": {"fields": [{"desc": true, "displayName": "Value"}]}}], "type": "table"}], "refresh": "5m", "schemaVersion": 36, "tags": ["capacity-planning", "module-05", "workshop", "multi-cluster"], "templating": {"list": [{"current": {}, "label": "Prometheus datasource", "name": "datasource", "query": "prometheus", "type": "datasource"}, {"allValue": ".+", "current": {"text": "All", "value": "$__all"}, "datasource": {"type": "prometheus", "uid": "${datasource}"}, "includeAll": true, "label": "Cluster", "multi": false, "name": "cluster", "query": "label_values(kube_pod_info, cluster)", "refresh": 2, "sort": 1, "type": "query"}]}, "timezone": "browser", "title": "Module 5 \u2014 Multi-Cluster Capacity Planning", "version": 2}

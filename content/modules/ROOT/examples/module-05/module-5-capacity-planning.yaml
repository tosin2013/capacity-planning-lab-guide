kind: ConfigMap
apiVersion: v1
metadata:
  name: module-5---capacity-planning
  namespace: open-cluster-management-observability
  labels:
    # grafana-custom-dashboard is the label watched by the RHACM grafana-dashboard-loader
    # for user-created dashboards.  Do NOT use general-folder: "true" — that label is
    # reserved for RHACM's own built-in dashboards and is not re-checked for custom ones.
    grafana-custom-dashboard: "true"
data:
  module-5---capacity-planning.json: |
    {
      "uid": "module-05-capacity-planning",
      "title": "Module 5 \u2014 Multi-Cluster Capacity Planning",
      "tags": ["capacity-planning", "module-05", "workshop", "multi-cluster"],
      "timezone": "browser",
      "schemaVersion": 36,
      "version": 1,
      "refresh": "5m",
      "panels": [
        {
          "id": 1,
          "type": "bargauge",
          "title": "Total Pods by Cluster",
          "description": "Current pod count per cluster. Green < 5000, yellow 5000-8000, red > 8000 (approaching etcd object count limit).",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "targets": [
            {
              "expr": "sum by (cluster) (kube_pod_info{cluster=~\"$cluster\"})",
              "legendFormat": "{{cluster}}",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "orientation": "horizontal",
            "displayMode": "gradient",
            "showUnfilled": true
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 5000},
                  {"color": "red", "value": 8000}
                ]
              }
            }
          }
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "CPU: Requested vs Used (All Clusters)",
          "description": "Compares total CPU requests (what pods asked for) against actual CPU usage. A large gap indicates over-provisioning.",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "targets": [
            {
              "expr": "sum(kube_pod_container_resource_requests{cluster=~\"$cluster\", resource=\"cpu\"})",
              "legendFormat": "Requested CPU (cores)",
              "refId": "A"
            },
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{cluster=~\"$cluster\", container!=\"\"}[5m]))",
              "legendFormat": "Actual CPU Usage (cores)",
              "refId": "B"
            }
          ],
          "options": {
            "tooltip": {"mode": "multi"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "cores",
              "custom": {"lineWidth": 2}
            }
          }
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Memory: Requested vs Used (All Clusters)",
          "description": "Compares total memory requests against actual working set memory. Gap shows memory over-provisioning across the fleet.",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "targets": [
            {
              "expr": "sum(kube_pod_container_resource_requests{cluster=~\"$cluster\", resource=\"memory\"})",
              "legendFormat": "Requested Memory",
              "refId": "A"
            },
            {
              "expr": "sum(container_memory_working_set_bytes{cluster=~\"$cluster\", container!=\"\"})",
              "legendFormat": "Actual Memory Usage",
              "refId": "B"
            }
          ],
          "options": {
            "tooltip": {"mode": "multi"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {"lineWidth": 2}
            }
          }
        },
        {
          "id": 4,
          "type": "table",
          "title": "Capacity Runway by Cluster (Days Until CPU Full)",
          "description": "Days remaining before CPU capacity is exhausted at current growth rate (30-day average). Red < 30 days, yellow 30-90, green > 90.",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "targets": [
            {
              "expr": "(\n  sum by (cluster) (kube_node_status_allocatable{cluster=~\"$cluster\", resource=\"cpu\"})\n  -\n  sum by (cluster) (kube_pod_container_resource_requests{cluster=~\"$cluster\", resource=\"cpu\"})\n)\n/\n(\n  sum by (cluster) (increase(kube_pod_container_resource_requests{cluster=~\"$cluster\", resource=\"cpu\"}[30d]) / 30)\n)",
              "legendFormat": "{{cluster}}",
              "refId": "A",
              "instant": true
            }
          ],
          "options": {
            "sortBy": [{"displayName": "Value", "desc": false}]
          },
          "fieldConfig": {
            "defaults": {
              "unit": "d",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "yellow", "value": 30},
                  {"color": "green", "value": 90}
                ]
              },
              "custom": {
                "displayMode": "color-background"
              }
            }
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Average Pod Density (pods/node)",
          "description": "Pods per worker node per cluster. Green < 150, yellow 150-200, red > 200 (approaching Kubernetes maxPods default of 250).",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "targets": [
            {
              "expr": "sum by (cluster) (kube_pod_info{cluster=~\"$cluster\"}) / sum by (cluster) (kube_node_info{cluster=~\"$cluster\", node_role_kubernetes_io_worker=\"\"})",
              "legendFormat": "{{cluster}}",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "displayName": "${__series.name}",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 150},
                  {"color": "red", "value": 200}
                ]
              }
            }
          }
        },
        {
          "id": 6,
          "type": "bargauge",
          "title": "etcd Database Size (MB)",
          "description": "etcd DB size per cluster. RHACM renames etcd_mvcc_db_total_size_in_bytes to etcd_debugging_mvcc_db_total_size_in_bytes in Thanos. Green < 4GB, yellow 4-6GB, red > 6GB (approaching the 8GB hard limit).",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "targets": [
            {
              "expr": "max by (cluster) (etcd_debugging_mvcc_db_total_size_in_bytes{cluster=~\"$cluster\"}) / 1024 / 1024",
              "legendFormat": "{{cluster}}",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "orientation": "horizontal",
            "displayMode": "gradient",
            "showUnfilled": true
          },
          "fieldConfig": {
            "defaults": {
              "unit": "decmbytes",
              "min": 0,
              "max": 8192,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 4096},
                  {"color": "red", "value": 6144}
                ]
              }
            }
          }
        },
        {
          "id": 7,
          "type": "table",
          "title": "Top 10 Namespaces by Avg CPU Request (30d Showback)",
          "description": "Identifies which namespaces consumed the most CPU resources over the last 30 days — the foundation of chargeback and capacity showback reports.",
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 24},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "targets": [
            {
              "expr": "topk(10, sum by (namespace, cluster) (avg_over_time(kube_pod_container_resource_requests{cluster=~\"$cluster\", resource=\"cpu\"}[30d])))",
              "legendFormat": "{{cluster}} / {{namespace}}",
              "refId": "A",
              "instant": true
            }
          ],
          "options": {
            "sortBy": [{"displayName": "Value", "desc": true}]
          },
          "fieldConfig": {
            "defaults": {
              "unit": "cores"
            }
          },
          "transformations": [
            {
              "id": "sortBy",
              "options": {
                "fields": [{"displayName": "Value", "desc": true}]
              }
            }
          ]
        }
      ],
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "label": "Prometheus datasource",
            "current": {}
          },
          {
            "name": "cluster",
            "type": "query",
            "datasource": {"type": "prometheus", "uid": "${datasource}"},
            "label": "Cluster",
            "query": "label_values(kube_pod_info, cluster)",
            "current": {"text": "All", "value": "$__all"},
            "includeAll": true,
            "allValue": ".+",
            "multi": false,
            "sort": 1,
            "refresh": 2
          }
        ]
      }
    }
